<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kantara Market</title>

<style>
body {font-family: Arial; margin:0; background:#f3f3f3;}
header {background:#111; color:white; padding:15px; text-align:center;}
.top {padding:10px; text-align:center;}
.top input {padding:10px; width:80%; border-radius:8px; border:1px solid #ccc;}

.container {
display:grid;
grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card {
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

button {
background:green;
color:white;
border:none;
padding:8px;
margin-top:8px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>Kantara Market</h1>
</header>

<div class="top">
<input type="text" id="search" placeholder="Ürün ara..." onkeyup="arama()">
</div>

<div class="container" id="urunler"></div>

<script>
let numara = "994703806022";

let urunListesi = [
{name:"Şampun", fiyat:60},
{name:"Salfetka", fiyat:25},
{name:"Əlcək", fiyat:40},
{name:"Plastik qab", fiyat:30},
{name:"Stəkan", fiyat:20},
{name:"Skotç", fiyat:15},
{name:"Bıçaq", fiyat:80}
];

function goster() {
let alan = document.getElementById("urunler");
alan.innerHTML = "";

urunListesi.forEach(u => {
alan.innerHTML += `
<div class="card">
<h4>${u.name}</h4>
<p>₺${u.fiyat}</p>
<button onclick="siparis('${u.name}')">Sipariş</button>
</div>`;
});
}

function siparis(ad) {
let mesaj = "Salam, " + ad + " sifariş etmək istəyirəm";
let link = "https://wa.me/" + numara + "?text=" + encodeURIComponent(mesaj);
window.open(link);
}

function arama() {
let input = document.getElementById("search").value.toLowerCase();
let kartlar = document.getElementsByClassName("card");

for (let i=0;i<kartlar.length;i++){
let text = kartlar[i].innerText.toLowerCase();
kartlar[i].style.display = text.includes(input) ? "" : "none";
}
}

goster();
</script>

</body>
</html>
